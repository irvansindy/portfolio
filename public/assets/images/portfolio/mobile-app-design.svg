<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Background gradient mesh -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="500" cy="60" r="120" fill="#d8b4fe" opacity="0.25"/>
  <circle cx="80" cy="340" r="90" fill="#a78bfa" opacity="0.2"/>
  <circle cx="300" cy="200" r="60" fill="#f0abfc" opacity="0.1"/>

  <!-- Phone mockup 1 (left, slightly rotated) -->
  <g transform="translate(100, 40) rotate(-8)">
    <rect x="0" y="0" width="140" height="280" rx="22" fill="#1e1b4b" stroke="#4338ca" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="6" y="14" width="128" height="252" rx="16" fill="#0f0a1e"/>
    <!-- Notch -->
    <rect x="45" y="14" width="50" height="12" rx="6" fill="#1e1b4b"/>
    <!-- App content -->
    <rect x="14" y="34" width="112" height="36" rx="8" fill="#4338ca" opacity="0.8"/>
    <rect x="22" y="42" width="55" height="6" rx="3" fill="#e0e7ff"/>
    <rect x="22" y="55" width="35" height="6" rx="3" fill="#818cf8"/>
    <rect x="100" y="40" width="18" height="18" rx="9" fill="#6366f1" opacity="0.6"/>
    <!-- Cards -->
    <rect x="14" y="80" width="112" height="52" rx="8" fill="#1e293b"/>
    <circle cx="34" cy="106" r="14" fill="#7c3aed" opacity="0.7"/>
    <rect x="56" y="96" width="55" height="7" rx="3" fill="#e2e8f0"/>
    <rect x="56" y="110" width="40" height="6" rx="3" fill="#64748b"/>
    <rect x="14" y="142" width="52" height="52" rx="8" fill="#312e81" opacity="0.7"/>
    <rect x="74" y="142" width="52" height="52" rx="8" fill="#1e3a5f" opacity="0.7"/>
    <rect x="20" y="155" width="38" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="20" y="168" width="28" height="6" rx="3" fill="#a78bfa"/>
    <rect x="80" y="155" width="38" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="80" y="168" width="28" height="6" rx="3" fill="#38bdf8"/>
    <!-- Chart mini -->
    <rect x="14" y="204" width="112" height="46" rx="8" fill="#1e293b"/>
    <polyline points="22,238 36,228 50,234 64,220 78,226 92,214 106,218 120,210" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="120" cy="210" r="3" fill="#a78bfa"/>
    <!-- Nav -->
    <rect x="6" y="248" width="128" height="18" rx="0" fill="#0f0a1e"/>
    <circle cx="36" cy="257" r="6" fill="#4338ca"/>
    <circle cx="70" cy="257" r="6" fill="#334155"/>
    <circle cx="104" cy="257" r="6" fill="#334155"/>
  </g>

  <!-- Phone mockup 2 (right, slightly rotated the other way) -->
  <g transform="translate(340, 50) rotate(6)">
    <rect x="0" y="0" width="140" height="280" rx="22" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="6" y="14" width="128" height="252" rx="16" fill="#fffbf5"/>
    <!-- Notch -->
    <rect x="45" y="14" width="50" height="12" rx="6" fill="#fff7ed"/>
    <!-- Header -->
    <rect x="14" y="28" width="80" height="8" rx="4" fill="#1c1917"/>
    <rect x="14" y="42" width="50" height="6" rx="3" fill="#a8a29e"/>
    <!-- Hero image sim -->
    <rect x="14" y="56" width="112" height="70" rx="10" fill="#fed7aa"/>
    <rect x="34" y="72" width="70" height="8" rx="4" fill="#c2410c"/>
    <rect x="34" y="86" width="50" height="6" rx="4" fill="#fb923c"/>
    <rect x="34" y="100" width="35" height="16" rx="8" fill="#ea580c"/>
    <!-- Product list -->
    <rect x="14" y="136" width="52" height="68" rx="8" fill="#fef3c7"/>
    <rect x="74" y="136" width="52" height="68" rx="8" fill="#dcfce7"/>
    <rect x="18" y="170" width="42" height="6" rx="3" fill="#1c1917"/>
    <rect x="18" y="182" width="30" height="6" rx="3" fill="#ea580c" opacity="0.8"/>
    <rect x="78" y="170" width="42" height="6" rx="3" fill="#1c1917"/>
    <rect x="78" y="182" width="30" height="6" rx="3" fill="#16a34a" opacity="0.8"/>
    <!-- Bottom bar -->
    <rect x="14" y="214" width="112" height="36" rx="10" fill="#ea580c"/>
    <rect x="30" y="227" width="80" height="7" rx="3" fill="#fff" opacity="0.9"/>
    <!-- Nav -->
    <rect x="6" y="248" width="128" height="18" rx="0" fill="#fff7ed"/>
    <circle cx="36" cy="257" r="6" fill="#ea580c"/>
    <circle cx="70" cy="257" r="6" fill="#d6d3d1"/>
    <circle cx="104" cy="257" r="6" fill="#d6d3d1"/>
  </g>

  <!-- Label -->
  <rect x="200" y="325" width="200" height="48" rx="14" fill="#7c3aed"/>
  <text x="300" y="344" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#ede9fe" font-weight="500">MOBILE APP DESIGN</text>
  <text x="300" y="362" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#c4b5fd" opacity="0.8">UI/UX • 2024</text>
</svg>
